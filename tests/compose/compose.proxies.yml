---
services:
  caddy-single:
    profiles:
      - caddy-single
    image: docker.io/library/caddy:2.8.4
    ports:
      - "80"
    volumes:
      - ./config/caddy_single/Caddyfile:/etc/caddy/Caddyfile:ro
  envoy-single:
    profiles:
      - envoy-single
    image: docker.io/envoyproxy/envoy:v1.25.11
    ports:
      - "80"
    volumes:
      - ./config/envoy_single/envoy.yaml:/etc/envoy/envoy.yaml:ro
  nginx-single:
    profiles:
      - nginx-single
    image: docker.io/library/nginx:1.27.5
    ports:
      - "80"
    volumes:
      - ./config/nginx_single/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  traefik-single:
    profiles:
      - traefik-single
    image: docker.io/library/traefik:v3.1.7
    ports:
      - "80"
    volumes:
      - ./config/traefik_single/traefik.yml:/etc/traefik/traefik.yml:ro
