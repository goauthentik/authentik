---
name: CI - Main daily

on:
  workflow_dispatch:
  schedule:
    # Every night at 3am
    - cron: "0 3 * * *"
  pull_request:
    paths:
      # Needs to refer to itself
      - .github/workflows/ci-main-daily.yml

jobs:
  test-container:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - docs
          - version-2026-2
          - version-2026-5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
      - run: |
          set -euo pipefail
          current="$(pwd)"
          dir="/tmp/authentik/${{ matrix.version }}"
          mkdir -p "${dir}/lifecycle/container"
          cd "${dir}"
          wget "https://${{ matrix.version }}.goauthentik.io/compose.yml" -O "${dir}/lifecycle/container/compose.yml"
          "${current}/scripts/test_docker.sh"
