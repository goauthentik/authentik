---
name: CI - Web

on:
  push:
    branches:
      - main
      - next
      - version-*
  pull_request:
    branches:
      - main
      - version-*

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: ./.github/actions/setup-node
        with:
          working-directory: web
      - name: Lint
        run: corepack npm run lint-check --prefix web
      - name: Check types
        run: corepack npm run tsc --prefix web
      - name: Check formatting
        run: corepack npm run prettier-check --prefix web
      - name: Lit analyse
        run: corepack npm run lit-analyse --prefix web

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: ./.github/actions/setup-node
        with:
          working-directory: web
      - name: build
        env:
          NODE_ENV: "production"
        working-directory: web/
        run: corepack npm run build
  ci-web-mark:
    if: always()
    needs:
      - build
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
  test:
    needs:
      - ci-web-mark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: ./.github/actions/setup-node
        with:
          working-directory: web
      - name: test
        working-directory: web/
        run: corepack npm run test || exit 0
