name: authentik-ci-web

on:
  push:
    branches:
      - main
      - next
      - version-*
  pull_request:
    branches:
      - main
      - version-*

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cache-web
        uses: actions/cache@v4
        with:
          path: web/dist
          key: ${{ runner.os }}-web-${{ hashFiles('web/package-lock.json', 'web/package-lock.json', 'web/src/**', 'web/packages/sfe/src/**') }}-b
      - name: Run ESLint
        run: |
          npm run lint -w @goauthentik/web
      - name: Check Lockfile
        run: |
          npm run lint:lockfile -w @goauthentik/web
      - name: Check Types
        run: |
          npm run lint:types
  build:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cache-web
        uses: actions/cache@v4
        with:
          path: web/dist
          key: ${{ runner.os }}-web-${{ hashFiles('web/package-lock.json', 'web/package-lock.json', 'web/src/**', 'web/packages/sfe/src/**') }}-b
      - name: Prepare Dependencies
        if: steps.cache-web.outputs.cache-hit != 'true'
        run: |
          npm ci
          make gen-client-ts
      - name: Run ESBuild
        run: |
          npm run build -w @goauthentik/web
          npm run build:sfe -w @goauthentik/web
  ci-web-mark:
    if: always()
    needs:
      - build
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
  test:
    name: Test Web UI
    needs:
      - ci-web-mark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cache-web
        uses: actions/cache@v4
        with:
          path: web/dist
          key: ${{ runner.os }}-web-${{ hashFiles('web/package-lock.json', 'web/package-lock.json', 'web/src/**', 'web/packages/sfe/src/**') }}-b
      - name: Prepare Dependencies
        if: steps.cache-web.outputs.cache-hit != 'true'
        run: |
          npm ci
          make gen-client-ts
      - name: Run Tests
        run: |
          npm run test -w @goauthentik/web || exit 0
