version: 1
metadata:
  labels:
    blueprints.goauthentik.io/system: "true"
  name: System - Object Attributes - User
entries:
  # Keys based on https://www.iana.org/assignments/jwt/jwt.xhtml
  # and https://openid.net/specs/openid-connect-core-1_0.html#AddressClaim
  identity:
    - model: authentik_core.objectattribute
      identifiers:
        key: given_name
        managed: goauthentik.io/object-attrs/user/identity/given_name
      attrs:
        group: Identity
        object_type: authentik_core.user
        label: Given Name
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: family_name
        managed: goauthentik.io/object-attrs/user/identity/family_name
      attrs:
        group: Identity
        object_type: authentik_core.user
        label: Family Name
        enabled: false
        is_required: false
        is_unique: false
        type: text
  ak:
    - model: authentik_core.objectattribute
      identifiers:
        key: settings.locale
        managed: goauthentik.io/object-attrs/user/settings/locale
      attrs:
        group: Settings
        object_type: authentik_core.user
        label: Locale
        enabled: true
        is_required: false
        is_unique: false
        type: text
  address:
    - model: authentik_core.objectattribute
      identifiers:
        key: address_street
        managed: goauthentik.io/object-attrs/user/address/street
      attrs:
        group: address/street_address
        object_type: authentik_core.user
        label: Street
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: address_region
        managed: goauthentik.io/object-attrs/user/address/region
      attrs:
        group: Address
        object_type: authentik_core.user
        label: Region
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: address_locality
        managed: goauthentik.io/object-attrs/user/address/locality
      attrs:
        group: Locality
        object_type: authentik_core.user
        label: Location
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: address_postal_code
        managed: goauthentik.io/object-attrs/user/address/postal_code
      attrs:
        group: Address
        object_type: authentik_core.user
        label: Postal code
        enabled: false
        is_required: false
        is_unique: false
        type: text
  contact:
    - model: authentik_core.objectattribute
      identifiers:
        key: phone_number
        managed: goauthentik.io/object-attrs/user/contact/phone_number
      attrs:
        group: Contact
        object_type: authentik_core.user
        label: Phone number(s)
        enabled: false
        is_required: false
        is_unique: false
        type: text
  unix:
    - model: authentik_core.objectattribute
      identifiers:
        key: unix_shell
        managed: goauthentik.io/object-attrs/user/unix/shell
      attrs:
        group: Unix
        object_type: authentik_core.user
        label: Shell
        enabled: false
        is_required: false
        is_unique: false
        type: text
  employee:
    - model: authentik_core.objectattribute
      identifiers:
        key: employee_number
        managed: goauthentik.io/object-attrs/user/employee/number
      attrs:
        group: Employee
        object_type: authentik_core.user
        label: Employee Number
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: employee_job_title
        managed: goauthentik.io/object-attrs/user/employee/job_title
      attrs:
        group: Employee
        object_type: authentik_core.user
        label: Title
        enabled: false
        is_required: false
        is_unique: false
        type: text
    - model: authentik_core.objectattribute
      identifiers:
        key: employee_departmenet
        managed: goauthentik.io/object-attrs/user/employee/departmenet
      attrs:
        group: Employee
        object_type: authentik_core.user
        label: Departement
        enabled: false
        is_required: false
        is_unique: false
        type: text
