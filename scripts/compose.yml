services:
  postgresql:
    container_name: postgres
    image: docker.io/library/postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: authentik
    command:
      ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    ports:
      - 127.0.0.1:5432:5432
    restart: always
  s3:
    container_name: s3
    image: docker.io/zenko/cloudserver
    environment:
      REMOTE_MANAGEMENT_DISABLE: "1"
      SCALITY_ACCESS_KEY_ID: accessKey1
      SCALITY_SECRET_ACCESS_KEY: secretKey1
    ports:
      - 8020:8000
    volumes:
      - s3-data:/usr/src/app/localData
      - s3-metadata:/usr/scr/app/localMetadata
    restart: always
  spotlight:
    image: ghcr.io/getsentry/spotlight
    ports:
      - 127.0.0.1:8969:8969
    restart: always
  diff:
    image: docker.io/openapitools/openapi-diff:2.1.7
    # Only run when explicitly invoked (e.g. `make gen-diff`), never on `docker compose up`.
    profiles:
      - diff
    restart: no
    network_mode: none
    volumes:
      - ../:/local

volumes:
  db-data:
    driver: local
  s3-data:
    driver: local
  s3-metadata:
    driver: local
