version: 1
metadata:
    name: Playwright e2e test admin
entries:
    - model: authentik_core.group
      state: present
      identifiers:
          name: "authentik Admins"
      attrs:
          is_superuser: true
      id: admin-group
    - model: authentik_core.user
      state: present
      identifiers:
          username: akadmin
      attrs:
          email: test-admin@goauthentik.io
          is_active: true
          name: authentik Default Admin
          password: test-runner
          path: users
          type: internal
          groups:
              - !KeyOf admin-group
